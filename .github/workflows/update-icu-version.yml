name: Update ICU Version Monthly

on:
  schedule:
    - cron: '0 0 1 * *'  # 1st of every month UTC
  workflow_dispatch:

jobs:
  update-icu:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Get latest ICU version
        id: icu
        run: |
          LATEST=$(curl -s https://api.github.com/repos/unicode-org/icu/releases/latest \
                   | grep -oP '"tag_name": "\Krelease-\d+')
          echo "LATEST=$LATEST" >> $GITHUB_ENV

      - name: Update ICU version in packaging.psm1
        run: |
          FILE=tools/packaging/packaging.psm1
          sed -i "s/ICU_VERSION\s*=\s*[0-9]\+/ICU_VERSION = ${LATEST#release-}/" $FILE
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git checkout -b update-icu-version
            git add $FILE
            git commit -m "Update ICU version to ${LATEST#release-}"
            git push -u origin update-icu-version
            gh pr create --title "Update ICU version to ${LATEST#release-}" \
                         --body "Automated monthly ICU update" \
                         --head update-icu-version --base main
          else
            echo "ICU version already up-to-date."
          fi
