name: Update ICU Version Monthly

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  update-icu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Update ICU version
        run: |
          FILE=tools/packaging/packaging.psm1
          LATEST=$(curl -s https://api.github.com/repos/unicode-org/icu/releases/latest \
                   | grep -oP '"tag_name": "\Krelease-\d+')
          sed -i.bak -E "s/^(\s*\$BuildICUVersion\s*=\s*)[0-9]+(\s*#.*)?$/\1$LATEST/" $FILE
          rm $FILE.bak

      - name: Commit and create PR
        run: |
          FILE=tools/packaging/packaging.psm1
          if ! git diff --quiet $FILE; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git checkout -b update-icu-version
            git add $FILE
            git commit -m "Update ICU version to $LATEST"
            git push -u origin update-icu-version
            gh pr create --title "Update ICU version to $LATEST" \
                         --body "Automated monthly ICU update" \
                         --head update-icu-version --base main
          else
            echo "ICU version already up-to-date."
          fi
