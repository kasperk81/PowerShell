name: Update ICU Version Monthly

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-icu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update ICU version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          FILE=tools/packaging/packaging.psm1
          LATEST=$(curl -s https://api.github.com/repos/unicode-org/icu/releases/latest \
            | grep -oP '"tag_name": "\Krelease-\d+')

          sed -i.bak -E "s/\$BuildICUVersion[[:space:]]*=[[:space:]]*[0-9]+/\$BuildICUVersion = $LATEST/" "$FILE"
          rm -f "$FILE.bak"

          if git diff --quiet -- "$FILE"; then
            echo "ICU version already up-to-date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b update-icu-version
          git add "$FILE"
          git commit -m "Update ICU version to $LATEST"
          git push -u origin update-icu-version

          gh pr create \
            --title "Update ICU version to $LATEST" \
            --body "Automated monthly ICU update" \
            --head update-icu-version \
            --base master
